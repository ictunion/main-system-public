name: "Melon Head"

on:
  push:

jobs:
  nix-build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      # Nix
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Build via nix
        working-directory: melon-head
        run: nix build .#melon-head
